name: 뉴스 배치 업데이트 (30분)

on:
  schedule:
    - cron: '*/30 * * * *'  # 30분마다
  workflow_dispatch:          # GitHub 대시보드에서 수동 실행 가능

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 20 셋업
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 오케스트레이터 실행 (뉴스+주가+지도+인사이트)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: node scripts/batch-runner.js

      - name: 배치 요약 및 zero-news streak 알람
        run: |
          STREAK=$(node -p "require('./public/data/meta.json').zeroNewsStreak || 0")
          REPORT=$(node -p "JSON.stringify(require('./public/data/meta.json').lastPollReport || {})")
          POLLED=$(node -p "new Date(require('./public/data/meta.json').lastPolledAt || 0).toLocaleString('ko-KR',{timeZone:'Asia/Seoul'})")
          {
            echo "## 📊 배치 결과"
            echo ""
            echo "- 마지막 폴링: $POLLED"
            echo "- 결과: \`$REPORT\`"
            echo "- Zero-news streak: $STREAK 회 (30분 × $STREAK = $((STREAK*30))분 정체)"
            if [ "$STREAK" -ge 48 ]; then
              echo ""
              echo "> ⚠️ **${STREAK}회 연속 새 뉴스 0건** — RSS 소스 점검 필요 (24시간+ 정체)"
            fi
          } >> $GITHUB_STEP_SUMMARY
          if [ "$STREAK" -ge 48 ]; then
            echo "::warning title=Zero-news streak::연속 ${STREAK}번 새 뉴스 0건 — RSS 소스 점검 필요"
          fi

      - name: 변경사항 커밋 & 푸시
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Jensen Bot"
          git add public/data/events.json public/data/meta.json public/data/news-live.json
          if ! git diff --staged --quiet; then
            git commit -m "batch: 자동 업데이트 $(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M KST')"
            git push
          fi
