name: 뉴스 배치 업데이트 (2시간)

on:
  schedule:
    - cron: '0 * * * *'  # 1시간마다
  workflow_dispatch:          # GitHub 대시보드에서 수동 실행 가능

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 20 셋업
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 오케스트레이터 실행 (뉴스+주가+지도+인사이트)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/batch-runner.js

      - name: 변경사항 커밋 & 푸시
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Jensen Bot"
          git add public/data/events.json public/data/meta.json public/news-live.json
          if ! git diff --staged --quiet; then
            git commit -m "batch: 자동 업데이트 $(TZ='Asia/Seoul' date +'%Y-%m-%d %H:%M KST')"
            git push
          fi
